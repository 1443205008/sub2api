name: Docker Hub Image

on:
  push:
    branches:
      - '**'
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-hub-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: godsama/sub2api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend on runner
        working-directory: frontend
        run: pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.3'

      - name: Prepare build metadata
        id: build_meta
        shell: bash
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build backend binaries on runner
        working-directory: backend
        env:
          COMMIT: ${{ github.sha }}
          DATE: ${{ steps.build_meta.outputs.date }}
        run: |
          mkdir -p ../dist/docker/linux-amd64 ../dist/docker/linux-arm64
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build \
              -tags embed \
              -trimpath \
              -ldflags="-s -w -X main.Commit=${COMMIT} -X main.Date=${DATE} -X main.BuildType=release" \
              -o "../dist/docker/linux-${arch}/sub2api" \
              ./cmd/server
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: godsama
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build runtime image and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.prebuilt
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
