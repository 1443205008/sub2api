name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: godsama/sub2api

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.2'

      - name: Compute image metadata
        id: vars
        run: |
          VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION)"
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "date=${DATE}" >> "${GITHUB_OUTPUT}"

          echo "tags<<EOF" >> "${GITHUB_OUTPUT}"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "${IMAGE_NAME}:latest" >> "${GITHUB_OUTPUT}"
          fi
          echo "${IMAGE_NAME}:sha-${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

          echo "labels<<EOF" >> "${GITHUB_OUTPUT}"
          echo "org.opencontainers.image.title=sub2api" >> "${GITHUB_OUTPUT}"
          echo "org.opencontainers.image.description=Sub2API - AI API Gateway Platform" >> "${GITHUB_OUTPUT}"
          echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" >> "${GITHUB_OUTPUT}"
          echo "org.opencontainers.image.revision=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "org.opencontainers.image.version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Build release binaries
        working-directory: backend
        run: |
          mkdir -p ../dist

          for ARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="${ARCH}" go build \
              -tags embed \
              -ldflags="-s -w -X main.Version=${{ steps.vars.outputs.version }} -X main.Commit=${GITHUB_SHA} -X main.Date=${{ steps.vars.outputs.date }} -X main.BuildType=release" \
              -trimpath \
              -o "../dist/sub2api-linux-${ARCH}" \
              ./cmd/server
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prebuilt
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: ${{ steps.vars.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
